<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>現在地ピン固定＋追跡</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { margin:0; text-align:center; font-family:sans-serif; }
canvas { width:100%; max-height:80vh; border:1px solid #ccc; }
button { padding:10px; margin:10px; }
</style>
</head>
<body>

<h3>①写真 → ②現在地にピン → ③自動追跡</h3>

<video id="video" autoplay playsinline></video>
<button onclick="takePhoto()">撮影</button>

<canvas id="canvas"></canvas>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let img = new Image();
let basePoint = null;
let baseGeo = null;

// カメラ起動
navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => video.srcObject = stream);

// 撮影
function takePhoto() {
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  ctx.drawImage(video, 0, 0);

  img.src = canvas.toDataURL();
  alert("今いる場所を画像上でタップしてください");
}

// タップで現在地を固定
canvas.addEventListener("click", (e) => {
  if (basePoint) return;

  const rect = canvas.getBoundingClientRect();
  const x = (e.clientX - rect.left) * (canvas.width / rect.width);
  const y = (e.clientY - rect.top) * (canvas.height / rect.height);

  navigator.geolocation.getCurrentPosition(pos => {
    basePoint = {x, y};
    baseGeo = {
      lat: pos.coords.latitude,
      lng: pos.coords.longitude
    };

    draw(basePoint);
    startTracking();
  });
});

// 描画
function draw(userPos=null) {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.drawImage(img, 0, 0);

  // 現在地
  if (userPos) {
    ctx.fillStyle = "blue";
    ctx.beginPath();
    ctx.arc(userPos.x, userPos.y, 10, 0, Math.PI*2);
    ctx.fill();
  }
}

// 簡易変換（移動量だけ反映）
function convert(lat, lng) {
  const dx = (lng - baseGeo.lng) * 100000;
  const dy = (lat - baseGeo.lat) * -100000;

  return {
    x: basePoint.x + dx,
    y: basePoint.y + dy
  };
}

// 追跡
function startTracking() {
  navigator.geolocation.watchPosition(pos => {
    const lat = pos.coords.latitude;
    const lng = pos.coords.longitude;

    const p = convert(lat, lng);
    draw(p);

  }, err => {
    alert("位置情報エラー");
  }, {
    enableHighAccuracy: true
  });
}
</script>

</body>
</html>
